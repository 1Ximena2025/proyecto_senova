{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - GESICOM</title>
    <link rel="stylesheet" href="{% static 'CSS/editar.css' %}">
</head>
<body>

<header>
    <div class="header-left">
        <a href="javascript:history.back()" class="back-arrow" title="Volver">←</a>
        <img src="{% static 'img/gesicom.png' %}" alt="GESICOM" class="logo">
    </div>

    <nav>
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'evidencia' %}">Evidencia</a>
    </nav>

    <div class="header-right">
        <div class="user-info">
            <span class="nombre">{{ user.get_full_name|default:user.username }}</span>
            <span class="email">{{ user.email }}</span>
        </div>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-cerrar">Cerrar sesión</button>
        </form>
    </div>
</header>

<main>

    <div class="page-header">
        <h1>Editar Perfil</h1>
        <p>Actualiza tu información personal</p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="message {% if message.tags == 'error' %}error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">

                <div class="form-group">
                    <label for="username">Nombre de Usuario</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="username" name="username" value="{{ user.username }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="nombre" name="nombre" value="{{ user.first_name }}" placeholder="Tu nombre">
                    </div>
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text" id="apellido" name="apellido" value="{{ user.last_name }}" placeholder="Tu apellido">
                    </div>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" id="correo" name="correo" value="{{ user.email }}" required>
                    </div>
                </div>

                <hr class="form-divider">

                <div class="form-group">
                    <label for="contrasena">Nueva Contraseña (opcional, 8 caracteres)</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" id="contrasena" name="contrasena" placeholder="Dejar en blanco para no cambiar">
                    </div>
                </div>

                <div class="form-footer">
                    <button type="submit" class="btn-guardar">Guardar cambios</button>
                </div>

            </div>
        </form>
    </div>

</main>

</body>
</html>
