{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESICOM - Reportes de Evidencia</title>
    <link rel="stylesheet" href="{% static 'instructor/reportes.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>GESICOM</h1>
        <nav>
            <a href="{% url 'home' %}">Inicio</a>
            <a href="{% url 'evidencia' %}">Evidencia</a>
            <a href="{% url 'evidencias_list' %}">Reportes</a>
            <a href="{% url 'logout' %}">Cerrar sesión</a>
        </nav>
    </header>
    <main>
        <h2>Reportes de Evidencia</h2>
        <section class="filtros">
            <label>Inicio <input type="date"></label>
            <label>Fin <input type="date"></label>
            <label>Categoría
                <select>
                    <option>Todas</option>
                    <option>DEPOS</option>
                    <option>Givit</option>
                    <option>IFPI</option>
                    <option>Tuga</option>
                    <option>LEM</option>
                </select>
            </label>
            <button class="btn-filtrar">Filtrar</button>
        </section>
        <section class="resumen">
            <div class="card resumen">
                <h3>{{ total_evidencias }}</h3>
                <p>Total Evidencias</p>
            </div>
            <div class="card resumen">
                <h3>{{ nuevas_30d }}</h3>
                <p>Nuevas Evidencias (30 días)</p>
            </div>
            <div class="card resumen">
                <h3>{{ aprobadas }}</h3>
                <p>Evidencias Aprobadas</p>
            </div>
        </section>
        <section class="graficos">
            <div class="grafico">
                <canvas id="evidenciasPorDia"></canvas>
            </div>
            <div class="grafico">
                <canvas id="categoriasEvidencia"></canvas>
            </div>
            <div class="grafico">
                <canvas id="estadoEvidencia"></canvas>
            </div>
            <div class="grafico">
                <canvas id="evidenciasPorUsuario"></canvas>
            </div>
        </section>
    </main>
    <script>
    // Datos desde Django
    const diasLabels = {{ dias_labels|safe }};
    const evidenciasPorDia = {{ evidencias_por_dia|safe }};
    const aprobadasPorDia = {{ aprobadas_por_dia|safe }};
    const categoriasLabels = {{ categorias_labels|safe }};
    const categoriasData = {{ categorias_data|safe }};
    const estadoLabels = {{ estado_labels|safe }};
    const estadoData = {{ estado_data|safe }};
    const usuariosLabels = {{ usuarios_labels|safe }};
    const usuariosData = {{ usuarios_data|safe }};

    // Evidencias por Día
    new Chart(document.getElementById('evidenciasPorDia'), {
        type: 'bar',
        data: {
            labels: diasLabels,
            datasets: [
                {
                    label: 'Nuevas',
                    backgroundColor: '#ffe082',
                    data: evidenciasPorDia
                },
                {
                    label: 'Aprobadas',
                    backgroundColor: '#3bb2f6',
                    data: aprobadasPorDia
                }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: { y: { beginAtZero: true } }
        }
    });

    // Categorías de Evidencia
    new Chart(document.getElementById('categoriasEvidencia'), {
        type: 'doughnut',
        data: {
            labels: categoriasLabels,
            datasets: [{
                data: categoriasData,
                backgroundColor: ['#3bb2f6', '#ffe082', '#27ae60', '#ff6384', '#7c5fff']
            }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // Estado de Evidencia
    new Chart(document.getElementById('estadoEvidencia'), {
        type: 'doughnut',
        data: {
            labels: estadoLabels,
            datasets: [{
                data: estadoData,
                backgroundColor: ['#27ae60', '#ffe082', '#ff6384']
            }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // Evidencias por Usuario
    new Chart(document.getElementById('evidenciasPorUsuario'), {
        type: 'bar',
        data: {
            labels: usuariosLabels,
            datasets: [{
                label: 'Evidencias',
                backgroundColor: ['#3bb2f6', '#ffe082', '#27ae60', '#ff6384', '#7c5fff'],
                data: usuariosData
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });
    </script>
</body>
</html>
